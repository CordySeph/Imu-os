name: Build and Publish Gaming ISO

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-iso:
    runs-on: ubuntu-latest
    name: Generate Custom ISO
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🚀 สั่งเครื่องมือให้ Build ตัวระบบปฏิบัติการภายในเครื่อง Runner เลย (ไม่ยุ่งกับระบบ Registry ด้านนอก)
      - name: Build ISO using BlueBuild
        uses: blue-build/github-action@v1.1
        with:
          recipe: 'recipes/recipe.yml'
          # ปิดการส่งอิมเมจขึ้นอินเทอร์เน็ต เพื่อตัดปัญหาเรื่องสิทธิ์ Username/Password ทั้งหมด
          push: false 

      # 📦 เมื่อด่านบนผ่านเสร็จ จะได้ไฟล์ในโฟลเดอร์ build/ นำมาอัปโหลดขึ้น GitHub Releases ให้เราโหลดได้ทันที
      - name: Upload ISO to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v0.1.0-alpha
          name: Imu-os Alpha 0.1.0
          draft: false
          prerelease: true
          files: |
            build/*.iso
            build/*.iso.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}