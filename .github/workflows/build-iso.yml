name: Build and Publish Gaming ISO

on:
  push:
    branches:
      - main
  workflow_dispatch: # เปิดให้เรากดสั่ง Build มือเองได้จากหน้าเว็บ GitHub

jobs:
  build-iso:
    runs-on: ubuntu-latest
    name: Generate Custom ISO
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # เรียกใช้ตัวช่วย Build ของ BlueBuild
      - name: Build ISO using BlueBuild
        uses: blue-build/github-action@v1.1
        with:
          recipe: 'recipes/recipe.yml'
          cosign_private_key: ${{ secrets.SIGNING_SECRET }} # สำหรับล็อกอินยืนยันความปลอดภัยไฟล์ OS

      # นำไฟล์ ISO ที่ได้ไปฝากไว้ในระบบ Release ของ GitHub ให้คนมากดโหลด
      - name: Upload ISO to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          files: |
            build/*.iso
            build/*.iso.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
