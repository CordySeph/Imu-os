name: Build and Publish Gaming ISO

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-iso:
    runs-on: ubuntu-latest
    name: Generate Custom ISO
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ✨ ขั้นตอนไม้ตาย: บังคับล็อกอินผ่านท่อ Stdin ทั้ง Docker และ Podman/Buildah ในระดับเครื่อง Runner
      - name: Hard-login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      # เมื่อเครื่อง Runner ตัวนอกล็อกอินผ่าน สิทธิ์จะถูกแชร์เข้าไปในคอนเทนเนอร์ของ BlueBuild โดยอัตโนมัติ
      - name: Build ISO using BlueBuild
        uses: blue-build/github-action@v1.1
        with:
          recipe: 'recipes/recipe.yml'
          registry: ghcr.io
          registry_namespace: ${{ github.repository_owner }}
          # ฝั่ง GitHub Actions ระบบจะเข้าใจสองคีย์นี้ทันทีเมื่อถูกส่งเข้าไปใน Action
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          push: true

      - name: Upload ISO to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v0.1.0-alpha
          name: Imu-os Alpha 0.1.0
          draft: false
          prerelease: true
          files: |
            build/*.iso
            build/*.iso.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}