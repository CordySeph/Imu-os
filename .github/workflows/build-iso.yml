# .github/workflows/build-iso.yml
name: Build and Publish Gaming ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-iso:
    runs-on: ubuntu-latest
    name: Generate Custom ISO
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ✨ เพิ่มสเตปนี้เข้าไปเพื่อล็อกอินเข้า GHCR อัตโนมัติ
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ส่วนของ BlueBuild เดิม (ปรับปรุงเอา push: true ออกในเฟสแรก หากยังไม่ได้ตั้งค่าคีย์สำหรับเซ็นความปลอดภัย)
      - name: Build ISO using BlueBuild
        uses: blue-build/github-action@v1.1
        with:
          recipe: 'recipes/recipe.yml'